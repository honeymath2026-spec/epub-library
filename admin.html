<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 관리 - EPUB Library</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
        }
        .add-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        input {
            padding: 12px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #5a67d8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .delete-btn {
            background: #e74c3c;
            padding: 6px 12px;
            font-size: 12px;
        }
        .code-box {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 20px;
        }
        hr {
            margin: 30px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 승인된 사용자 관리</h1>
    
    <div class="add-section">
        <h3>➕ 새 사용자 추가</h3>
        <input type="text" id="new-username" placeholder="사용자 이름 (영문)">
        <input type="text" id="new-password" placeholder="비밀번호">
        <input type="text" id="new-name" placeholder="실제 이름">
        <button onclick="addUser()">추가하기</button>
    </div>
    
    <h3>📋 현재 사용자 목록</h3>
    <table id="user-table">
        <thead>
            <tr><th>사용자 이름</th><th>비밀번호</th><th>실제 이름</th><th>관리</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    
    <hr>
    
    <h3>📋 책 목록 코드 복사</h3>
    <div class="code-box" id="book-code"></div>
    
    <button onclick="copyBookCode()" style="margin-top: 10px;">📋 책 목록 코드 복사하기</button>
</div>

<script>
    let currentUsers = [];
    
    function loadUsers() {
        const saved = localStorage.getItem('library_users');
        if (saved) {
            currentUsers = JSON.parse(saved);
        } else {
            currentUsers = [
                { username: "terry", password: "1234", name: "Terry" }
            ];
            saveUsers();
        }
        renderTable();
        updateBookCode();
    }
    
    function saveUsers() {
        localStorage.setItem('library_users', JSON.stringify(currentUsers));
        updateMainPageCode();
    }
    
    function renderTable() {
        const tbody = document.querySelector('#user-table tbody');
        tbody.innerHTML = '';
        currentUsers.forEach((user, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${user.username}</td>
                    <td>${user.password}</td>
                    <td>${user.name}</td>
                    <td><button class="delete-btn" onclick="removeUser(${index})">삭제</button></td>
                </tr>
            `;
        });
    }
    
    function addUser() {
        const username = document.getElementById('new-username').value.trim();
        const password = document.getElementById('new-password').value.trim();
        const name = document.getElementById('new-name').value.trim();
        
        if (!username || !password || !name) {
            alert('모든 항목을 입력하세요.');
            return;
        }
        
        if (currentUsers.find(u => u.username === username)) {
            alert('이미 존재하는 사용자 이름입니다.');
            return;
        }
        
        currentUsers.push({ username, password, name });
        saveUsers();
        renderTable();
        
        document.getElementById('new-username').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('new-name').value = '';
        
        alert('사용자가 추가되었습니다!');
    }
    
    function removeUser(index) {
        if (confirm('정말 삭제하시겠습니까?')) {
            currentUsers.splice(index, 1);
            saveUsers();
            renderTable();
        }
    }
    
    function updateMainPageCode() {
        const userCode = `const allowedUsers = ${JSON.stringify(currentUsers, null, 4)};`;
        console.log('사용자 정보 업데이트됨:', userCode);
    }
    
    function updateBookCode() {
        const dummyBooks = [
            { id: 1, title: "예제 책 1", file: "epub/sample1.epub", cover: "📖", author: "작자미상" },
            { id: 2, title: "예제 책 2", file: "epub/sample2.epub", cover: "📚", author: "작자미상" }
        ];
        const bookCode = `const books = ${JSON.stringify(dummyBooks, null, 4)};`;
        document.getElementById('book-code').innerHTML = bookCode;
    }
    
    function copyBookCode() {
        const code = document.getElementById('book-code').innerText;
        navigator.clipboard.writeText(code);
        alert('책 목록 코드가 복사되었습니다! index.html의 books 배열에 붙여넣으세요.');
    }
    
    loadUsers();
</script>
</body>
</html>
